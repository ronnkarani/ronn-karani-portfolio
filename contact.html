<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Ronny Karani</title>
  <link href="https://unicons.iconscout.com/release/v4.0.0/css/line.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
  <div class="container nav__wrapper">
    <div class="logo">Ronny</div>
    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="menu-icon"><i class="uil uil-bars"></i></label>
    <ul class="nav__links">
      <li><a href="#home">Home</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav__icons">
      <i class="uil uil-moon toggle-theme" id="themeToggle"></i>
      <i class="uil uil-user login-icon" title="Login"></i>
    </div>
  </div>
</header>

  <!-- Contact Section -->
  <main class="section contact-page">
    <div class="container">
      <h2 class="section-title">Get In Touch</h2>
      <div class="contact-wrapper">
        <!-- Contact Form -->
        <form class="contact-form">
          <input type="text" placeholder="Your Name" required />
          <input type="email" placeholder="Your Email" required />
          <textarea placeholder="Your Message" required></textarea>
          <button type="submit">Send Message</button>
        </form>

        <!-- Contact Info -->
        <div class="contact-info">
          <h3>Contact Info</h3>
          <p><i class="uil uil-envelope"></i> karanironny25@gmail.com</p>
          <p><i class="uil uil-location-point"></i> Kenya, East Africa</p>
          <div class="contact-socials">
            <a href="https://github.com/ronnkarani" target="_blank"><i class="uil uil-github"></i></a>
            <a href="https://linkedin.com/in/ronnkarani" target="_blank"><i class="uil uil-linkedin"></i></a>
            <a href="mailto:karanironny25@gmail.com"><i class="uil uil-envelope"></i></a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2025 Ronny Karani. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
